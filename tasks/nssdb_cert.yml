---
- name: "Export cert from nssdb if present {{ nssdb_user ~ ':' ~ nssdb_cert.name }}"
  ansible.builtin.command:
    argv:
      - certutil
      - -L
      - -d
      - "sql:{{ nssdb_home }}/.pki/nssdb"
      - -n
      - "{{ nssdb_cert.name }}"
      - -a
  register: nssdb_cert_pem
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ nssdb_user }}"

- name: "Get fingerprint of cert in nssdb {{ nssdb_user ~ ':' ~ nssdb_cert.name }}"
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -fingerprint
      - -sha256
      - -noout
    stdin: "{{ nssdb_cert_pem.stdout }}"
  register: nssdb_cert_fingerprint
  changed_when: false
  failed_when: false
  when: nssdb_cert_pem.rc == 0

- name: "Get fingerprint of expected cert {{ nssdb_cert.name }}"
  ansible.builtin.command:
    argv:
      - openssl
      - x509
      - -in
      - "{{ ca_certificates_os_trust_paths[ansible_facts.os_family] }}/{{ nssdb_cert.name }}"
      - -fingerprint
      - -sha256
      - -noout
  register: expected_cert_fingerprint
  changed_when: false

- name: "Remove outdated cert from nssdb {{ nssdb_user ~ ':' ~ nssdb_cert.name }}"
  ansible.builtin.command:
    argv:
      - certutil
      - -D
      - -d
      - "sql:{{ nssdb_home }}/.pki/nssdb"
      - -n
      - "{{ nssdb_cert.name }}"
  when:
    - nssdb_cert_pem.rc == 0
    - nssdb_cert_fingerprint.stdout | trim != expected_cert_fingerprint.stdout | trim
  changed_when: true
  become: true
  become_user: "{{ nssdb_user }}"

- name: "Add cert to nssdb {{ nssdb_user ~ ':' ~ nssdb_cert.name }}"
  ansible.builtin.command:
    argv:
      - certutil
      - -A
      - -d
      - "sql:{{ nssdb_home }}/.pki/nssdb"
      - -n
      - "{{ nssdb_cert.name }}"
      - -t
      - "CT,,"
      - -i
      - "{{ ca_certificates_os_trust_paths[ansible_facts.os_family] }}/{{ nssdb_cert.name }}"
  when: >
    nssdb_cert_pem.rc != 0 or
    nssdb_cert_fingerprint.stdout | trim != expected_cert_fingerprint.stdout | trim
  changed_when: true
  become: true
  become_user: "{{ nssdb_user }}"
